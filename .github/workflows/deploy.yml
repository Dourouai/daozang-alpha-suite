name: Deploy daocang Bot

on:
  # Server deployment is paused. Keep an explicit manual recovery path without
  # recreating the deleted BaoTa deployment on every push to main.
  workflow_dispatch:

concurrency:
  group: deploy-daocang-bot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DAOZANG_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DAOZANG_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DAOZANG_DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DAOZANG_DEPLOY_SSH_KEY }}
      DEPLOY_INSTALL_DAOZANG_RESEARCH: ${{ vars.DAOZANG_INSTALL_RESEARCH || 'false' }}
      DEPLOY_ENABLE_OPTIONAL_TIMERS: ${{ vars.DAOZANG_ENABLE_OPTIONAL_TIMERS || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy_secrets
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::notice::Missing deploy secrets; skipping SSH deploy."
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.deploy_enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/daozang_deploy_key
          chmod 600 ~/.ssh/daozang_deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        if: steps.deploy_secrets.outputs.deploy_enabled == 'true'
        run: |
          ssh -i ~/.ssh/daozang_deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "INSTALL_DAOZANG_RESEARCH='$DEPLOY_INSTALL_DAOZANG_RESEARCH' ENABLE_OPTIONAL_TIMERS='$DEPLOY_ENABLE_OPTIONAL_TIMERS' DEPLOY_REVISION='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          export APP_DIR="/www/wwwroot/daozang-alpha-suite"
          export BRANCH="main"
          export REPO_URL="https://github.com/Dourouai/daozang-alpha-suite.git"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$TMP_DIR"
          mkdir -p "$APP_DIR"
          tar -C "$TMP_DIR" \
            --exclude='./.git' \
            --exclude='./beichen-alpha/.venv' \
            --exclude='./beichen-alpha/config/local.env' \
            --exclude='./beichen-alpha/data/positions/current_positions.json' \
            --exclude='./beichen-alpha/data/decision_logs' \
            --exclude='./beichen-alpha/data/runtime' \
            --exclude='./beichen-alpha/logs' \
            --exclude='./daozang-alpha/.venv' \
            --exclude='./daozang-alpha/data' \
            --exclude='./daozang-alpha/reports' \
            -cf - . | tar -C "$APP_DIR" -xf -

          if [ -n "${DEPLOY_REVISION:-}" ]; then
            printf '%s\n' "$DEPLOY_REVISION" > "$APP_DIR/.deployed_revision"
          fi

          cd "$APP_DIR"
          SKIP_GIT_UPDATE=true bash deploy/scripts/deploy_beichen_server.sh
          REMOTE
